<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlowLift - Diario de Fuerza Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-principal: #0f172a;
            --bg-tarjeta: #1e293b;
            --bg-input: #334155;
            --texto-principal: #f8fafc;
            --texto-secundario: #94a3b8;
            --color-acento: #38bdf8;
            --color-exito: #10b981; /* Verde esmeralda premium */
            --color-peligro: #f87171;
            --borde-radio: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .contenedor {
            width: 100%;
            max-width: 500px; /* Más compacto, estilo app móvil */
        }

        header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        header h1 span {
            color: var(--color-acento);
        }

        .fecha-actual {
            font-size: 13px;
            font-weight: 500;
            color: var(--texto-secundario);
            background: var(--bg-tarjeta);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #334155;
        }

        .tarjeta-sesion {
            background-color: var(--bg-tarjeta);
            border-radius: var(--borde-radio);
            padding: 16px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--texto-secundario);
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid #475569;
            color: var(--texto-principal);
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--color-acento);
            background-color: #3d4e66;
        }

        .ejercicio-bloque {
            background-color: var(--bg-tarjeta);
            border-radius: var(--borde-radio);
            padding: 16px;
            margin-bottom: 16px;
            border-left: 4px solid var(--color-acento);
            transition: border-color 0.3s;
        }

        .ejercicio-cabecera {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
        }

        .tabla-series {
            width: 100%;
            margin-bottom: 12px;
        }

        .fila-cabecera {
            display: grid;
            grid-template-columns: 0.6fr 1fr 1fr 0.5fr 0.5fr;
            text-align: center;
            margin-bottom: 8px;
            font-size: 11px;
            font-weight: 700;
            color: var(--texto-secundario);
        }

        .fila-serie {
            display: grid;
            grid-template-columns: 0.6fr 1fr 1fr 0.5fr 0.5fr;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            padding: 4px 0;
            border-radius: 6px;
            transition: all 0.3s;
        }

        /* Estado cuando completas la serie */
        .fila-serie.completada {
            background-color: rgba(16, 185, 129, 0.15);
        }
        .fila-serie.completada input {
            color: var(--color-exito);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .num-serie {
            text-align: center;
            font-weight: 700;
            background: #334155;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            line-height: 24px;
            margin: 0 auto;
            font-size: 12px;
        }

        .fila-serie input {
            text-align: center;
            padding: 8px;
            font-weight: 600;
        }

        .btn {
            background: none;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secundario {
            background-color: rgba(56, 189, 248, 0.08);
            color: var(--color-acento);
            width: 100%;
            margin-bottom: 12px;
            border: 1px dashed rgba(56, 189, 248, 0.3);
        }

        .btn-secundario:hover {
            background-color: rgba(56, 189, 248, 0.15);
        }

        .btn-check {
            color: var(--texto-secundario);
            font-size: 16px;
        }
        .btn-check:hover { color: var(--color-exito); }
        .fila-serie.completada .btn-check { color: var(--color-exito); }

        .btn-eliminar {
            color: #64748b;
            font-size: 14px;
        }
        .btn-eliminar:hover { color: var(--color-peligro); }

        .btn-principal {
            background-color: var(--color-acento);
            color: var(--bg-principal);
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 10px;
            border-radius: var(--borde-radio);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.2);
        }

        .btn-principal:hover {
            background-color: #7dd3fc;
            transform: translateY(-1px);
        }


        .sidebar {
            position: fixed;
            top: 0;
            left: -280px; /* Escondida por defecto a la izquierda */
            width: 280px;
            height: 100%;
            background-color: var(--bg-tarjeta);
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
        }

        /* Clase que activa la barra (se añade con JS) */
        .sidebar.activo {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .sidebar-header h2 {
            font-size: 20px;
            font-weight: 800;
            color: var(--color-acento);
        }

        .btn-cerrar-sidebar {
            background: none;
            border: none;
            color: var(--texto-secundario);
            font-size: 20px;
            cursor: pointer;
        }

        .btn-cerrar-sidebar:hover {
            color: var(--color-peligro);
        }

        .sidebar-contenido {
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-contenido a {
            color: var(--texto-principal);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }

        .sidebar-contenido a i {
            color: var(--color-acento);
            width: 20px;
            text-align: center;
        }

        .sidebar-contenido a:hover {
            background-color: var(--bg-input);
        }

        /* Fondo oscuro translúcido */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            z-index: 999;
            display: none; /* Escondido por defecto */
        }

        .sidebar-overlay.activo {
            display: block;
        }

    </style>
</head>
<body>

    <div class="contenedor">
        <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <h2>GlowMenu</h2>
        <button class="btn-cerrar-sidebar" onclick="toggleSidebar()">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
    <div class="sidebar-contenido">
        <a href="#" onclick="toggleSidebar()"><i class="fa-solid fa-dumbbell"></i> Diario de Entrenamiento</a>
        <a href="#" onclick="alert('Próximamente: observaciones')"><i class="fa-solid fa-apple-whole"></i> Observaciones </a>
        <a href="#" onclick="toggleSidebar()"><i class="fa-solid fa-gear"></i> Ajustes</a>
    </div>
</div>

<!-- Fondo oscuro que cubre la pantalla al abrir el menú -->
<div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="contenedor">
    <header>
        <!-- NUEVO: Icono de 3 rayas a la izquierda -->
        <button class="btn-menu" onclick="toggleSidebar()" style="background: none; border: none; color: var(--texto-principal); font-size: 22px; cursor: pointer; padding: 4px;">
            <i class="fa-solid fa-bars"></i>
        </button>
        
        <h1 style="margin-left: 10px; flex-grow: 1;">Glow<span>Lift</span></h1>
        
        <input type="date" id="fechaEntrenamiento" class="fecha-actual" style="border: 1px solid #334155; padding: 6px 12px; background: var(--bg-tarjeta); color: var(--texto-secundario); font-weight: 600; font-size: 13px; width: auto; font-family: inherit;">
    </header>

        <!-- Registro de entrenamiento activo -->
        <div class="tarjeta-sesion">
            <label for="nombreRutina">Nombre del Entrenamiento</label>
            <input type="text" id="nombreRutina" placeholder="Ej. Empuje / Pierna" value="Rutina A: Torso">
        </div>

        <div id="listaEjercicios"></div>

        <button class="btn btn-secundario" onclick="agregarEjercicio()">
            <i class="fa-solid fa-plus"></i> Añadir Ejercicio
        </button>

        <button class="btn btn-principal" onclick="guardarEntrenamiento()">
            <i class="fa-solid fa-circle-check"></i> Finalizar Entrenamiento
        </button>

        <!-- NUEVO: BOTÓN PARA DISPARAR EL EMAIL (OPCIÓN A) -->
        <button class="btn" onclick="enviarReportePorEmail()" style="background-color: rgba(248, 113, 113, 0.1); color: var(--color-peligro); border: 1px solid rgba(248, 113, 113, 0.3); width: 100%; margin-top: 20px; padding: 12px;">
            <i class="fa-solid fa-paper-plane"></i> Enviar Reporte Semanal al Correo
        </button>
        

        <!-- SECCIÓN DE HISTORIAL SEMANAL PREMIUM -->
        <div class="historial-seccion" style="margin-top: 40px; border-top: 1px dashed #334155; padding-top: 24px;">
            <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--texto-principal); display: flex; align-items: center; gap: 8px;">
                <i class="fa-solid fa-calendar-weeks" style="color: var(--color-acento);"></i> Historial por Semanas
            </h2>
            <div id="contenedorSemanas">
                <!-- Aquí se inyectarán las semanas dinámicamente -->
            </div>
        </div>
    </div>

    <script>

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            sidebar.classList.toggle('activo');
            overlay.classList.toggle('activo');
        }
        
        // Pone la fecha de hoy por defecto en formato AAAA-MM-DD que requiere el input date
        const hoy = new Date();
        const año = hoy.getFullYear();
        const mes = String(hoy.getMonth() + 1).padStart(2, '0');
        const dia = String(hoy.getDate()).padStart(2, '0');
        document.getElementById('fechaEntrenamiento').value = `${año}-${mes}-${dia}`;

        let contadorEjercicios = 0;

        function agregarEjercicio() {
            contadorEjercicios++;
            const lista = document.getElementById('listaEjercicios');
            
            const bloque = document.createElement('div');
            bloque.className = 'ejercicio-bloque';
            bloque.id = `ejercicio-${contadorEjercicios}`;
            
            bloque.innerHTML = `
                <div class="ejercicio-cabecera">
                    <div style="width: 85%;">
                        <select class="select-ejercicio" onchange="verificarPersonalizado(this, ${contadorEjercicios})">
                            <option value="Press de Banca ">Press de Banca </option>
                            <option value="Sentadillas ">Sentadillas </option>
                            <option value="Peso Muerto Rumano">Peso Muerto Rumano</option>
                            <option value="Dominadas">Dominadas</option>
                            <option value="Press Militar ">Press Militar </option>
                            <option value="Curl de Bíceps">Curl de Bíceps</option>
                            <option value="OTRO">+ Añadir ejercicio personalizado...</option>
                        </select>
                        <input type="text" class="input-personalizado" placeholder="Escribe el nombre del ejercicio" style="display:none; margin-top:8px;">
                    </div>
                    <button class="btn btn-eliminar" style="padding:4px;" onclick="eliminarBloque('ejercicio-${contadorEjercicios}')">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
                
                <div class="tabla-series">
                    <div class="fila-cabecera">
                        <div>SERIE</div>
                        <div>KG</div>
                        <div>REPES</div>
                        <div>CHECK</div>
                        <div></div>
                    </div>
                    <div class="contenedor-series" id="series-container-${contadorEjercicios}"></div>
                </div>
                
                <button class="btn btn-secundario" style="font-size: 12px; padding: 6px; margin-bottom:0;" onclick="agregarSerie(${contadorEjercicios})">
                    <i class="fa-solid fa-plus"></i> Añadir Serie
                </button>
            `;
            
            lista.appendChild(bloque);
            agregarSerie(contadorEjercicios);
        }

        function verificarPersonalizado(select, id) {
            const inputPers = select.parentElement.querySelector('.input-personalizado');
            if (select.value === "OTRO") {
                inputPers.style.display = "block";
                inputPers.focus();
            } else {
                inputPers.style.display = "none";
            }
        }

        function agregarSerie(idEjercicio) {
            const contenedor = document.getElementById(`series-container-${idEjercicio}`);
            const numeroSeries = contenedor.children.length + 1;
            
            const fila = document.createElement('div');
            fila.className = 'fila-serie';
            
            fila.innerHTML = `
                <div class="num-serie">${numeroSeries}</div>
                <div><input type="number" step="any" inputmode="decimal" class="input-kg" placeholder="0"></div>
                <div><input type="number" inputmode="numeric" pattern="[0-9]*" class="input-reps" placeholder="0"></div>
                <div style="text-align: center;">
                    <button class="btn btn-check" style="padding:0;" onclick="toggleCheck(this)">
                        <i class="fa-solid fa-circle-check"></i>
                    </button>
                </div>
                <div style="text-align: center;">
                    <button class="btn btn-eliminar" style="padding:0;" onclick="this.parentElement.parentElement.remove(); reordenarSeries(${idEjercicio});">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                </div>
            `;
            contenedor.appendChild(fila);
        }

        function toggleCheck(btn) {
            const fila = btn.parentElement.parentElement;
            fila.classList.toggle('completada');
        }

        function eliminarBloque(id) {
            document.getElementById(id).remove();
        }

        function reordenarSeries(idEjercicio) {
            const contenedor = document.getElementById(`series-container-${idEjercicio}`);
            if(contenedor) {
                Array.from(contenedor.children).forEach((fila, index) => {
                    fila.querySelector('.num-serie').innerText = index + 1;
                });
            }
        }

        function guardarEntrenamiento() {
            const nombreRutina = document.getElementById('nombreRutina').value;
            const bloques = document.querySelectorAll('.ejercicio-bloque');
            
            const fechaSeleccionada = document.getElementById('fechaEntrenamiento').value; // Formato AAAA-MM-DD
            const partesFecha = fechaSeleccionada.split('-');
            const fechaFormateada = `${partesFecha[2]}/${partesFecha[1]}/${partesFecha[0]}`; // Convertimos a DD/MM/AAAA

            let datosEntrenamiento = {
                rutina: nombreRutina,
                fecha: fechaFormateada,
                timestamp: new Date(fechaSeleccionada).getTime() || Date.now(), // Usa el tiempo de la fecha elegida para ordenar bien el historial
                ejercicios: []
            };

            bloques.forEach(bloque => {
                const select = bloque.querySelector('.select-ejercicio');
                let nombreEjercicio = select.value;
                
                if (nombreEjercicio === "OTRO") {
                    nombreEjercicio = bloque.querySelector('.input-personalized').value || "Ejercicio Personalizado";
                }

                const filasSeries = bloque.querySelectorAll('.fila-serie');
                let seriesData = [];

                filasSeries.forEach(fila => {
                    const kg = fila.querySelector('.input-kg').value || 0;
                    const reps = fila.querySelector('.input-reps').value || 0;
                    const completada = fila.classList.contains('completada');
                    seriesData.push({ kg: parseFloat(kg), reps: parseInt(reps), hecha: completada });
                });

                datosEntrenamiento.ejercicios.push({
                    nombre: nombreEjercicio,
                    series: seriesData
                });
            });

            // 1. Guardado en el navegador (Local Storage) para refrescar al instante la interfaz
            let historial = JSON.parse(localStorage.getItem('historial_gym')) || [];
            historial.push(datosEntrenamiento);
            localStorage.setItem('historial_gym', JSON.stringify(historial));
            renderizarHistorialSemanal();

            // 2. Sincronización con FastAPI para escribir el archivo JSON de logs en tu Mac
            fetch("/api/guardar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(datosEntrenamiento)
            })
            .then(res => res.json())
            .then(data => {
                console.log("Sincronizado con el servidor:", data.message);
                alert('¡Entrenamiento guardado y sincronizado en el servidor!');
            })
            .catch(err => {
                console.error("Error al sincronizar con el backend:", err);
                alert('Guardado de forma local. Recuerda iniciar main.py para sincronizar con el servidor.');
            });
        }

        function obtenerNumeroSemana(fechaStr) {
            const partes = fechaStr.split('/');
            const fecha = new Date(partes[2], partes[1] - 1, partes[0]);
            const primeraFechaAño = new Date(fecha.getFullYear(), 0, 1);
            const diasPasados = Math.floor((fecha - primeraFechaAño) / (24 * 60 * 60 * 1000));
            return Math.ceil((diasPasados + primeraFechaAño.getDay() + 1) / 7);
        }

        function renderizarHistorialSemanal() {
            const contenedor = document.getElementById('contenedorSemanas');
            const fechaSeleccionada = document.getElementById('fechaEntrenamiento').value; // Formato AAAA-MM-DD
            const partesFecha = fechaSeleccionada.split('-');
            const fechaFiltro = `${partesFecha[2]}/${partesFecha[1]}/${partesFecha[0]}`; // Formato DD/MM/AAAA

            // Pedimos los datos reales al archivo JSON de tu Mac
            fetch("/api/historial")
            .then(res => res.json())
            .then(historial => {
                if (!historial || historial.length === 0) {
                    contenedor.innerHTML = `<p style="color: var(--texto-secundario); font-size: 13px; text-align: center; padding: 20px;">Aún no has registrado ningún entrenamiento. ¡Dale caña hoy!</p>`;
                    return;
                }

                // Ordenamos para que los más nuevos salgan arriba
                historial.sort((a, b) => b.timestamp - a.timestamp);

                // Agrupamos por semanas
                const gruposSemanas = {};
                historial.forEach(entreno => {
                    const partes = entreno.fecha.split('/');
                    const fechaObjeto = new Date(partes[2], partes[1] - 1, partes[0]);
                    
                    const diaSemana = fechaObjeto.getDay(); 
                    const diferenciaLunes = diaSemana === 0 ? -6 : 1 - diaSemana; 
                    
                    const lunes = new Date(fechaObjeto);
                    lunes.setDate(fechaObjeto.getDate() + diferenciaLunes);
                    
                    const domingo = new Date(lunes);
                    domingo.setDate(lunes.getDate() + 6);

                    const opcionesMes = { day: '2-digit', month: 'short' };
                    const lunesStr = lunes.toLocaleDateString('es-ES', opcionesMes);
                    const domingoStr = domingo.toLocaleDateString('es-ES', opcionesMes);
                    const añoStr = lunes.getFullYear();

                    const claveGrupo = `Semana: ${lunesStr} al ${domingoStr} (${añoStr})`;
                    
                    if (!gruposSemanas[claveGrupo]) {
                        gruposSemanas[claveGrupo] = [];
                    }
                    gruposSemanas[claveGrupo].push(entreno);
                });

                // Construimos el HTML
                let htmlFinal = '';
                for (const [semana, entrenos] of Object.entries(gruposSemanas)) {
                    htmlFinal += `
                        <div class="bloque-semana" style="margin-bottom: 24px;">
                            <div style="font-size: 12px; font-weight: 700; color: var(--color-acento); letter-spacing: 0.03em; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                                <i class="fa-regular fa-calendar" style="font-size: 11px;"></i> ${semana}
                            </div>
                    `;

                    entrenos.forEach(entreno => {
                        // DETALLE PREMIUM: Si el entreno coincide con la fecha del selector, le ponemos un borde verde brillante
                        const esFechaSeleccionada = entreno.fecha === fechaFiltro;
                        const estiloBorde = esFechaSeleccionada 
                            ? 'border: 1px solid var(--color-exito); box-shadow: 0 0 8px rgba(16, 185, 129, 0.2);' 
                            : 'border: 1px solid #334155;';

                        htmlFinal += `
                            <div class="tarjeta-historial-entreno" style="background: #1e293b; border-radius: 8px; padding: 12px; margin-bottom: 10px; ${estiloBorde}">
                                <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; margin-bottom: 8px;">
                                    <span style="color: ${esFechaSeleccionada ? 'var(--color-exito)' : 'var(--texto-principal)'};">${entreno.rutina}</span>
                                    <span style="color: var(--texto-secundario); font-size: 12px;">${entreno.fecha} ${esFechaSeleccionada ? '🔹' : ''}</span>
                                </div>
                        `;

                        entreno.ejercicios.forEach(ej => {
                            const seriesHechas = ej.series.filter(s => s.hecha).length;
                            const totalSeries = ej.series.length;
                            const pesos = ej.series.map(s => s.kg);
                            const maxPeso = pesos.length > 0 ? Math.max(...pesos) : 0;

                            htmlFinal += `
                                <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--texto-secundario); padding: 4px 0; border-top: 1px solid #2d3748;">
                                    <span>• ${ej.nombre} (${seriesHechas}/${totalSeries} series)</span>
                                    <span style="font-weight: 600; color: var(--texto-principal);">${maxPeso} kg máx</span>
                                </div>
                            `;
                        });

                        htmlFinal += `</div>`;
                    });

                    htmlFinal += `</div>`;
                }

                contenedor.innerHTML = htmlFinal;
            })
            .catch(err => console.error("Error al leer el historial del servidor Mac:", err));
        }

        // Conexión con el endpoint de FastAPI que gestiona el protocolo SMTP de correos
        function enviarReportePorEmail() {
            const boton = event.target.closest('button');
            const textoOriginal = boton.innerHTML;
            
            // Efecto visual de carga
            boton.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Enviando Reporte...`;
            boton.disabled = true;

            fetch("/api/enviar-reporte", { method: "POST" })
            .then(res => {
                if(!res.ok) throw new Error("Error en las credenciales del servidor.");
                return res.json();
            })
            .then(data => {
                alert("¡Bum! Reporte generado y enviado a tu correo electrónico.");
            })
            .catch(err => {
                alert("No se pudo enviar. Verifica haber configurado correctamente tus datos de Gmail en main.py");
                console.error(err);
            })
            .finally(() => {
                boton.innerHTML = textoOriginal;
                boton.disabled = false;
            });
        }
        
        // Carga inicial
        agregarEjercicio();
        renderizarHistorialSemanal();


    </script>
